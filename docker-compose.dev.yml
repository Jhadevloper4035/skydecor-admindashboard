
name: skydecor-dev

services:

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    container_name: skydecor-backend-dev
    build:
      context: ./backend
      target: development          # uses the 'development' stage in backend/Dockerfile
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - ./backend/.env.development
    environment:
      NODE_ENV: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src    

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    container_name: skydecor-frontend-dev
    build:
      context: ./frontend
      target: development          # uses the 'development' stage in frontend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"               # Vite default dev port
    volumes:
      - ./frontend/src:/app/src   # live HMR
    depends_on:
      - backend

