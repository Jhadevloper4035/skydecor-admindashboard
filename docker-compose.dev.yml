
name: skydecor-dev

services:

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    container_name: skydecor-backend-dev
    build:
      context: ./backend
      target: development
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - ./backend/.env.development
    environment:
      NODE_ENV: development
      ALLOWED_ORIGINS: "http://localhost:5173"
    ports:
      - "8000:8000"               # exposed to host for direct API access / debugging
    volumes:
      - ./backend/src:/app/src
    networks:
      - skydecor-dev-net

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    container_name: skydecor-frontend-dev
    build:
      context: ./frontend
      target: development
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      # Empty so browser requests go to /api/... and Vite proxy forwards them
      # to http://backend:8000 over the internal Docker network
      VITE_API_BASE_URL: ""
    ports:
      - "5173:5173"               # Vite dev server
    volumes:
      - ./frontend/src:/app/src   # live HMR
    depends_on:
      - backend
    networks:
      - skydecor-dev-net

networks:
  skydecor-dev-net:
    driver: bridge

