
# ══════════════════════════════════════════════════════════════════════════════
#  Development compose
#
#  Usage:
#    docker compose -f docker-compose.dev.yml up --build
#    docker compose -f docker-compose.dev.yml down -v   # also removes volumes
#
#  Env files (create these before first run, never commit them):
#    backend/.env.development
#    frontend/.env.development
# ══════════════════════════════════════════════════════════════════════════════

name: skydecor-dev

services:

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: skydecor-mongo-dev
    restart: unless-stopped
    ports:
      - "27017:27017"           # expose so you can connect from Compass / Mongosh
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-secret}
      MONGO_INITDB_DATABASE: skydecor
    volumes:
      - mongo_dev_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    container_name: skydecor-backend-dev
    build:
      context: ./backend
      target: development          # uses the 'development' stage in backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.development
    environment:
      NODE_ENV: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src    # live hot-reload via nodemon
    depends_on:
      mongo:
        condition: service_healthy

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    container_name: skydecor-frontend-dev
    build:
      context: ./frontend
      target: development          # uses the 'development' stage in frontend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./frontend/.env.development
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"               # Vite default dev port
    volumes:
      - ./frontend/src:/app/src   # live HMR
    depends_on:
      - backend

volumes:
  mongo_dev_data:
