name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/skydecor-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/skydecor-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create backend .env.production
        run: |
          cat > backend/.env.production << EOF
          PORT=8000
          NODE_ENV=production
          DATABASE_URL=${{ secrets.BACKEND_DB_URL }}
          DBNAME=${{ secrets.BACKEND_DBNAME }}
          JWT_SECRET=${{ secrets.BACKEND_JWT_SECRET }}
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
          API_ENDPOINT=${{ secrets.API_ENDPOINT }}
          ADMIN_SECRET=${{ secrets.BACKEND_ADMIN_SECRET }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          S3_BUCKET=${{ secrets.S3_BUCKET }}
          EOF

      - name: Create frontend .env
        run: |
          cat > frontend/.env << EOF
          VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          VITE_WEBSITE_BASE_URL=${{ secrets.VITE_WEBSITE_BASE_URL }}
          VITE_ADMIN_SECRET=${{ secrets.VITE_ADMIN_SECRET }}
          EOF

      - name: Build images
        run: docker compose -f docker-compose.prod.yml build

      - name: List images
        run: docker images

      - name: Tag & push backend
        run: |
          docker tag ${{ env.BACKEND_IMAGE }}:latest ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Tag & push frontend
        run: |
          docker tag ${{ env.FRONTEND_IMAGE }}:latest ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  smoke-test:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull backend image
        run: docker pull ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Start backend container
        run: |
          docker run -d --name smoke-backend \
            -e PORT=8000 \
            -e NODE_ENV=production \
            -e DATABASE_URL=${{ secrets.BACKEND_DB_URL }} \
            -e DBNAME=${{ secrets.BACKEND_DBNAME }} \
            -e JWT_SECRET=${{ secrets.BACKEND_JWT_SECRET }} \
            -e ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }} \
            -e API_ENDPOINT=${{ secrets.API_ENDPOINT }} \
            -e ADMIN_SECRET=${{ secrets.BACKEND_ADMIN_SECRET }} \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_REGION=${{ secrets.AWS_REGION }} \
            -e S3_BUCKET=${{ secrets.S3_BUCKET }} \
            -p 8000:8000 \
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Wait for backend to respond
        run: |
          for i in $(seq 1 15); do
            if curl -s http://localhost:8000/health | grep -q '"server":"ok"'; then
              echo "Backend is up"
              exit 0
            fi
            echo "Attempt $i — waiting..."
            sleep 3
          done
          echo "Backend did not respond in time"
          docker logs smoke-backend
          exit 1

      - name: Verify health response
        run: |
          response=$(curl -s http://localhost:8000/health)
          echo "$response"
          echo "$response" | grep -q '"server":"ok"' || (echo "Health check failed" && exit 1)

      - name: Pull frontend image
        run: docker pull ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Start frontend container
        run: |
          docker run -d --name smoke-frontend \
            -p 80:8080 \
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Verify frontend serves HTML
        run: |
          sleep 3
          curl -sf http://localhost:80 | grep -q "<html" || (echo "Frontend not serving HTML" && exit 1)
          echo "Frontend OK"

  deploy:
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME
          script: |
            set -e
            cd /opt/admindashboard

            # Pull latest code (compose file updates, nginx config, etc.)
            git pull origin main

            # Pull pre-built images from Docker Hub
            DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME \
              docker compose -f docker-compose.prod.yml pull backend frontend

            # Restart containers using pulled images (no local build)
            DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME \
              docker compose -f docker-compose.prod.yml up -d --no-build

            # Remove dangling images to free disk space
            docker image prune -f

            # Post-deploy smoke test
            sleep 5
            curl -sf http://localhost:8000/health | grep -q '"server":"ok"' \
              || (echo "Post-deploy backend health check failed" && exit 1)
            curl -sf http://localhost:80 | grep -q "<html" \
              || (echo "Post-deploy frontend check failed" && exit 1)
            echo "Post-deploy checks passed"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
