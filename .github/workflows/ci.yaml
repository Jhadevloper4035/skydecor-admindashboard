name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/skydecor-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/skydecor-frontend

jobs:

  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Build — runs on every push & PR
  # Gate: if this fails, docker + deploy jobs are skipped
  # ─────────────────────────────────────────────────────────────────

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Docker — builds images on GitHub runner & pushes to Hub
  # Only runs on push to main (not PRs)
  # ─────────────────────────────────────────────────────────────────

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create backend .env.production (for image build)
        run: |
          printf '%s\n' \
            "PORT=8000" \
            "NODE_ENV=production" \
            "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            "DBNAME=${{ secrets.DBNAME }}" \
            "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}" \
            "API_ENDPOINT=${{ secrets.API_ENDPOINT }}" \
            "ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}" \
            "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            "AWS_REGION=${{ secrets.AWS_REGION }}" \
            "S3_BUCKET=${{ secrets.S3_BUCKET }}" \
            > backend/.env.production

      - name: Create frontend .env (Vite bakes these into the bundle at build time)
        run: |
          printf '%s\n' \
            "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" \
            "VITE_WEBSITE_BASE_URL=${{ secrets.VITE_WEBSITE_BASE_URL }}" \
            "VITE_ADMIN_SECRET=${{ secrets.VITE_ADMIN_SECRET }}" \
            > frontend/.env

      - name: Build images via docker-compose.prod.yml
        run: docker compose -f docker-compose.prod.yml build

      - name: Tag & push backend image
        run: |
          docker tag ${{ env.BACKEND_IMAGE }}:latest ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Tag & push frontend image
        run: |
          docker tag ${{ env.FRONTEND_IMAGE }}:latest ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Deploy — SSHes into EC2, pulls images, restarts containers
  # FIX 1: docker-compose.prod.yml uses image: not build:
  # FIX 2: docker compose down before up (forces container recreation)
  # FIX 3: health checks restored after deploy
  # ─────────────────────────────────────────────────────────────────
  
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DBNAME: ${{ secrets.DBNAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DATABASE_URL,DBNAME,JWT_SECRET,ALLOWED_ORIGINS,API_ENDPOINT,ADMIN_SECRET,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION,S3_BUCKET
          script: |
            set -e
            cd /opt/admindashboard

            # 1. Pull latest code (picks up any docker-compose.prod.yml changes)
            git pull origin main

            # 2. Write backend runtime .env from CI-injected secrets
            #    (never stored in repo, written fresh on every deploy)
            printf '%s\n' \
              "PORT=8000" \
              "NODE_ENV=production" \
              "DATABASE_URL=$DATABASE_URL" \
              "DBNAME=$DBNAME" \
              "JWT_SECRET=$JWT_SECRET" \
              "ALLOWED_ORIGINS=$ALLOWED_ORIGINS" \
              "API_ENDPOINT=$API_ENDPOINT" \
              "ADMIN_SECRET=$ADMIN_SECRET" \
              "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" \
              "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" \
              "AWS_REGION=$AWS_REGION" \
              "S3_BUCKET=$S3_BUCKET" \
              > backend/.env.production

            # 3. Login to Docker Hub and pull pre-built images
            #    (images were built with secrets on GitHub runner — no rebuild here)
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME docker compose -f docker-compose.prod.yml pull

            # FIX 2: Stop and remove old containers before starting new ones
            #         Without this, 'up -d' won't recreate containers even with a new image
            docker compose -f docker-compose.prod.yml down

            # 4. Start fresh containers from pulled images — no rebuild on EC2
            docker compose -f docker-compose.prod.yml up -d --no-build

            # 5. Clean up dangling images to free disk space
            docker image prune -f

            # FIX 3: Smoke test — fail the pipeline if containers are unhealthy
            #         Gives containers 5s to fully start before checking
            sleep 5
            curl -sf http://localhost:8000/api/health | grep -q '"server":"ok"' \
              || (echo "FAILED: Backend health check" && exit 1)
            curl -sf http://localhost:3001 | grep -q "<html" \
              || (echo "FAILED: Frontend health check" && exit 1)

            echo "Deploy successful"