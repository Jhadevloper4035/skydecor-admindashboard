
# ══════════════════════════════════════════════════════════════════════════════
#  Production compose
#
#  Usage:
#    docker compose -f docker-compose.prod.yml up --build -d
#    docker compose -f docker-compose.prod.yml down
#
#  Env files (create on the server, never commit them):
#    backend/.env.production     → DATABASE_URL, JWT_SECRET, AWS_*, …
#    frontend/.env.production    → VITE_API_URL, …
#
#  MongoDB is NOT included — production uses MongoDB Atlas (DATABASE_URL in env).
# ══════════════════════════════════════════════════════════════════════════════

name: skydecor-prod

services:

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    container_name: skydecor-backend-prod
    build:
      context: ./backend
      target: production           # uses the 'production' stage in backend/Dockerfile
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
    ports:
      - "8000:8000"
    # No source bind-mounts in prod — image is immutable
    healthcheck:
      # distroless has no shell — use the node binary (always present) to HTTP-check
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:8000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    container_name: skydecor-frontend-prod
    build:
      context: ./frontend
      target: production           # builds static assets → served by nginx
    restart: always
    env_file:
      - ./frontend/.env.production
    ports:
      - "80:8080"    # nginx-unprivileged listens on 8080 internally
    depends_on:
      backend:
        condition: service_healthy
