name: skydecor-prod

services:

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    container_name: skydecor-backend
    image: ${BACKEND_IMAGE:-skydecor-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
    expose:
      - "8000"
    networks:
      - skydecor-net

  # ── Frontend ─────────────────────────────────────────────────────────────────
  # nginx-unprivileged serves on port 8080 internally; host port 3001 avoids
  # conflict with Nginx on the EC2 host which occupies port 80.

  frontend:
    container_name: skydecor-frontend
    image: ${FRONTEND_IMAGE:-skydecor-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:8080"
    networks:
      - skydecor-net

networks:
  skydecor-net:
    driver: bridge
