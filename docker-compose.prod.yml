name: skydecor-prod

services:

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    container_name: skydecor-backend-prod
    build:
      context: ./backend
      target: production           # uses the 'production' stage in backend/Dockerfile
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:8000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    container_name: skydecor-frontend-prod
    build:
      context: ./frontend
      target: production          
    restart: always
    env_file:
      - ./frontend/.env
    ports:
      - "80:8080"    
    depends_on:
      backend:
        condition: service_healthy
